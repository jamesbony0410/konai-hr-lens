<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KONA HR LENS</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F1117;
  --surface: #1A1D27;
  --surface2: #222636;
  --border: #2E3248;
  --accent: #4F7EFF;
  --accent2: #7C5CFC;
  --green: #22C55E;
  --red: #EF4444;
  --yellow: #F59E0B;
  --text: #E8EAF0;
  --text-mid: #8B90A7;
  --text-dim: #4A4F6A;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
  min-height: 100vh;
  line-height: 1.6;
}
.layout { display: flex; min-height: 100vh; }
.sidebar {
  width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  height: 100vh;
  overflow-y: auto;
}
.sidebar-header { padding: 28px 24px 20px; border-bottom: 1px solid var(--border); }
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.logo-text { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.logo-sub { font-size: 11px; color: var(--text-mid); letter-spacing: 0.5px; }
.position-list { padding: 16px 12px; flex: 1; }
.position-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; padding: 0 12px; margin-bottom: 8px; }
.position-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: all .15s; margin-bottom: 2px; }
.position-item:hover { background: var(--surface2); }
.position-item.active { background: rgba(79,126,255,.15); }
.position-item.active .pos-name { color: var(--accent); }
.pos-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; transition: all .15s; }
.position-item.active .pos-dot { background: var(--accent); }
.pos-name { font-size: 13px; font-weight: 500; color: var(--text-mid); line-height: 1.4; }
.add-position-btn { margin: 8px 12px 16px; padding: 10px 12px; border: 1.5px dashed var(--border); border-radius: 10px; background: transparent; color: var(--text-dim); font-family: inherit; font-size: 13px; cursor: pointer; width: calc(100% - 24px); text-align: left; display: flex; align-items: center; gap: 8px; transition: all .15s; }
.add-position-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,126,255,.05); }
.main { margin-left: 280px; flex: 1; padding: 40px 48px; max-width: calc(100vw - 280px); }
.main-header { margin-bottom: 32px; }
.main-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
.main-subtitle { font-size: 14px; color: var(--text-mid); }
.jd-preview { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; margin-bottom: 24px; max-height: 180px; overflow-y: auto; }
.jd-preview::-webkit-scrollbar { width: 4px; }
.jd-preview::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.jd-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
.jd-text { font-size: 13px; color: var(--text-mid); line-height: 1.8; white-space: pre-wrap; }
.input-section { margin-bottom: 24px; }
.input-label { font-size: 12px; font-weight: 600; color: var(--text-mid); letter-spacing: 0.5px; margin-bottom: 10px; display: block; }
textarea.resume-input { width: 100%; min-height: 200px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 18px 20px; color: var(--text); font-family: inherit; font-size: 14px; line-height: 1.8; resize: vertical; outline: none; transition: border-color .15s; }
textarea.resume-input:focus { border-color: var(--accent); }
textarea.resume-input::placeholder { color: var(--text-dim); }
.screen-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 12px; color: #fff; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all .2s; box-shadow: 0 8px 32px rgba(79,126,255,.3); }
.screen-btn:hover { transform: translateY(-1px); }
.screen-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.spin { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
.result-card { margin-top: 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; display: none; }
.result-header { padding: 20px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--border); }
.verdict-badge { display: flex; align-items: center; gap: 8px; padding: 8px 18px; border-radius: 30px; font-size: 14px; font-weight: 700; }
.verdict-badge.pass { background: rgba(34,197,94,.15); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
.verdict-badge.fail { background: rgba(239,68,68,.15); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
.verdict-badge.review { background: rgba(245,158,11,.15); color: var(--yellow); border: 1px solid rgba(245,158,11,.3); }
.verdict-pos { font-size: 13px; color: var(--text-mid); }
.result-body { padding: 24px; }
.result-section { margin-bottom: 24px; }
.result-section:last-child { margin-bottom: 0; }
.result-section-title { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; }
.summary-text { font-size: 14px; color: var(--text); line-height: 1.8; }
.criteria-list { display: flex; flex-direction: column; gap: 10px; }
.criteria-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; background: var(--surface2); border-radius: 10px; }
.criteria-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.criteria-text { font-size: 13px; color: var(--text-mid); line-height: 1.6; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px; width: 100%; max-width: 560px; }
.modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.modal p { font-size: 13px; color: var(--text-mid); margin-bottom: 24px; line-height: 1.6; }
.modal input, .modal textarea { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; transition: border-color .15s; margin-bottom: 12px; }
.modal input:focus, .modal textarea:focus { border-color: var(--accent); }
.modal textarea { min-height: 200px; resize: vertical; line-height: 1.7; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
.btn-cancel { padding: 10px 20px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text-mid); font-family: inherit; font-size: 14px; cursor: pointer; transition: all .15s; }
.btn-cancel:hover { border-color: var(--text-mid); color: var(--text); }
.btn-save { padding: 10px 24px; border-radius: 10px; background: var(--accent); border: none; color: #fff; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-save:hover { background: #3d6ef5; }
.empty-state { text-align: center; padding: 80px 40px; color: var(--text-dim); }
.empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty-text { font-size: 15px; }
.err-box { margin-top: 20px; background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); border-radius: 12px; padding: 16px 20px; font-size: 14px; color: var(--red); }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.result-card.show { display: block; animation: fadeIn .3s ease; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">🔍</div>
        <div>
          <div class="logo-text">KONA HR LENS</div>
          <div class="logo-sub">HR 스크리닝 툴</div>
        </div>
      </div>
    </div>
    <div class="position-list">
      <div class="position-label">포지션</div>
      <div id="positionList"></div>
    </div>
    <button class="add-position-btn" onclick="openAddModal()">＋ 포지션 추가</button>
  </aside>
  <main class="main" id="mainContent">
    <div class="empty-state">
      <div class="empty-icon">👈</div>
      <div class="empty-text">왼쪽에서 포지션을 선택해주세요</div>
    </div>
  </main>
</div>
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>포지션 추가</h3>
    <p>포지션명과 JD를 입력하면 스크리닝 기준으로 저장돼요.<br>개인정보 없이 경력/자격 내용만 입력해주세요.</p>
    <input type="text" id="newPosName" placeholder="포지션명 (예: 백엔드 개발자)" />
    <textarea id="newPosJD" placeholder="JD 내용을 붙여넣어 주세요..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">취소</button>
      <button class="btn-save" onclick="savePosition()">저장</button>
    </div>
  </div>
</div>
<script>
const DEFAULT_POSITIONS=[{id:'global-marketing',name:'글로벌마케팅',jd:`[소속] 문화사업팀 소속. 공간·문화·콘텐츠를 비즈니스로 설계하고 시장과 연결하는 역할.\n\n[담당 업무]\n- 글로벌 시장 타겟 마케팅 전략 수립 및 실행\n- 해외 플랫폼/채널/파트너와 커뮤니케이션하며 콘텐츠 유통 구조 설계\n- 글로벌 캠페인 성과 데이터 기반 분석 및 개선\n- 브랜드 가치를 글로벌 언어/맥락에 맞게 재해석\n\n[필수 조건]\n- 영어로 글로벌 파트너 및 내부 이해관계자와 원활한 협업 가능 (필수)\n- 다품종 콘텐츠 구조에 맞춘 글로벌 마케팅 실행 경험\n- 아이디어를 이슈로 만들고 확산시킨 경험\n- 사원~과장급 (경력 유연)\n\n[우대 조건]\n- 글로벌 플랫폼/해외 유통 네트워크 이해도\n- 데이터 분석으로 글로벌 마케팅 성과 증명 경험\n- 글로벌 PR 경험`},{id:'service-planning',name:'서비스 기획_결제플랫폼',jd:`[서비스] 코나카드·지역화폐 포함 결제 플랫폼. B2C/B2B/B2G 다양한 이해관계자 대상.\n\n[담당 업무]\n- 결제 플랫폼 프론트엔드/백엔드 서비스 기획 및 고도화\n- 지역화폐 서비스 유저 시나리오 설계 및 정책 수립\n- 데이터 기반 핵심 지표 정의 및 서비스 개선 과제 도출\n- 개발/디자인/운영/외부 파트너 협업\n\n[필수 조건]\n- B2C/B2B/B2G 플랫폼 서비스 기획 또는 운영 경험\n- Axure, Figma, Confluence, Jira 등 기획·협업 툴 실무 경험\n- 데이터 기반 문제 정의 및 개선 방향 수립·실행 경험\n\n[우대 조건]\n- 결제/금융/지역화폐 등 핀테크 또는 공공 연계 서비스 기획 경험\n- 복잡한 요구사항을 구조화하여 서비스로 구현한 경험\n- 서비스 기획~운영~고도화 라이프사이클 전체 경험`},{id:'ai-developer',name:'에이전틱 AI 서비스 개발자',jd:`[서비스] 대체투자 AI 에이전트 서비스(KIWA), ERP AI 워크스페이스. 딥 에이전트 아키텍처 기반.\n\n[담당 업무]\n- 딥 에이전트 플랫폼 핵심 기능 개발 및 고도화\n- 에이전트 오케스트레이션, 프롬프트 엔지니어링, 도구 설계, 스킬 개발\n- 고객사 요구사항 반영한 서비스 아키텍처 개선 및 신규 기능 구현\n- 최신 AI 기술 탐색 및 서비스 적용\n\n[필수 조건]\n- AI 관련 프로젝트 개발 경험 1년 이상\n- React와 Python 개발 능숙\n- MCP, RAG, LangChain 등 최신 AI 기술 이해도 또는 활용 경험\n- Cursor, Claude Code 등 AI 코딩 도구 활용 능력\n\n[우대 조건]\n- AI 에이전트 기반 프로덕트 개발/운영 경험\n- 영어 기술 문서 독해 능력\n- Docker, AWS 인프라, DevOps 경험`},{id:'service-ops',name:'서비스운영_결제플랫폼',jd:`[서비스] 지역화폐 지역 커뮤니티 플랫폼. 전국 60여 개 지자체 대상.\n\n[담당 업무]\n- 지자체 플랫폼 운영 이슈 해결 (백오피스 운영)\n- 결제 플랫폼 운영 프로세스 검토 및 개선/기획\n- 데이터 지원, 정책 수당 및 정산 업무\n- VOC 분석 및 개선 대응책 제시\n\n[필수 조건]\n- 내부 유관 부서와 원활한 커뮤니케이션을 통한 서비스 운영 경험\n- 정확하고 안정적인 업무처리 능력\n- 결제 산업·플랫폼 구조에 대한 이해와 관심\n\n[우대 조건]\n- 플랫폼/결제 서비스 내부 운영 정책 또는 프로세스 수립 경험\n- 효율적 운영 프로세스 개선 적극적 태도\n- 개발 부서와 소통 가능한 IT 지식`},{id:'sales',name:'영업_결제플랫폼',jd:`[서비스] 지역화폐 기반 지역 커뮤니티 플랫폼. 전국 60여 개 지자체 대상.\n\n[담당 업무]\n- 지역화폐 사업 지자체 제휴 구축 및 운영\n- 다양한 부가 서비스 제안 및 영업\n- 지자체와 지속적 소통하며 플랫폼 운영 및 관리\n\n[필수 조건]\n- 지자체/가맹점 등 다양한 이해관계자와 네트워크 유지 역량\n- 개발/사업/디자인 등 다양한 부서와 협업 능력\n- 입찰 및 계약 관리를 위한 제안서·공문서 작성 능력\n\n[우대 조건]\n- 플랫폼 서비스/결제/IT 산업 이해도\n- 공공영업(B2G) 및 입찰 비즈니스 경험`},{id:'ir',name:'IR_공통',jd:`[담당 업무]\n- 국내외 투자자·애널리스트와 상시 소통하며 코나아이 가치 전달\n- 법령 기반 사업 내용 및 재무 현황 공시\n- 실적 발표 및 정기 주주총회 준비·운영\n- 분기별 IR 자료 작성 및 업데이트\n\n[필수 조건]\n- IR 경험 3년 이상 ~ 9년 이하\n- 기본적인 재무지식 보유 (재무제표 이해 필수)\n- 회사 가치를 외부에 알릴 수 있는 세일즈 역량\n\n[우대 조건]\n- 스타트업에서 사업·전략·IR 등 다양한 역할 수행 경험\n- 투자자 관점에 맞춰 시장·비즈니스 구조 설명 및 설득 경험\n- 문서 작성 능력 및 정보 정리·전달 역량`},{id:'dba',name:'DBA',jd:`[소속] System Operation팀.\n\n[담당 업무]\n- DB 모니터링, 백업/복구, DB 암호화 솔루션 관리\n- DB 성능 최적화 (Object 관리, SQL 튜닝)\n- 장애 분석 및 Trouble Shooting\n\n[필수 조건]\n- DBA 운영 경험 3년 이상\n- Oracle DBA 경험 3년 이상 (필수)\n- 개발자 및 데이터 담당자와 원활한 커뮤니케이션 능력\n\n[우대 조건]\n- 대용량 DB 구축/운영 경험 및 RAC 운영 경험\n- RAC EXADATA 운영 경험\n- Shell script, PL/SQL 개발 능력\n- 리눅스 환경 DB 경험`}];
let positions=[],selectedId=null;
function init(){const saved=localStorage.getItem('screening_positions');if(saved){positions=JSON.parse(saved);}else{positions=DEFAULT_POSITIONS;saveToStorage();}renderSidebar();}
function saveToStorage(){localStorage.setItem('screening_positions',JSON.stringify(positions));}
function renderSidebar(){const list=document.getElementById('positionList');list.innerHTML=positions.map(p=>`<div class="position-item ${p.id===selectedId?'active':''}" onclick="selectPosition('${p.id}')"><div class="pos-dot"></div><div class="pos-name">${p.name}</div></div>`).join('');}
function selectPosition(id){selectedId=id;renderSidebar();const pos=positions.find(p=>p.id===id);if(!pos)return;document.getElementById('mainContent').innerHTML=`<div class="main-header"><div class="main-title">${pos.name}</div><div class="main-subtitle">이력서 내용을 붙여넣고 스크리닝을 시작하세요</div></div><div class="jd-preview"><div class="jd-label">JD 요약</div><div class="jd-text">${pos.jd}</div></div><div class="input-section"><label class="input-label">이력서 내용 (개인정보 제외 — 경력/자격사항만)</label><textarea class="resume-input" id="resumeInput" placeholder="경력사항, 주요 업무, 스킬, 자격증 등을 붙여넣어 주세요.&#10;이름, 연락처, 주소 등 개인정보는 제외해주세요."></textarea></div><button class="screen-btn" id="screenBtn" onclick="runScreening('${id}')"><div class="spin" id="spin"></div><span id="btnTxt">🔍 스크리닝 시작</span></button><div id="resultArea"></div>`;}
async function runScreening(posId){const pos=positions.find(p=>p.id===posId);const resume=document.getElementById('resumeInput').value.trim();if(!resume){alert('이력서 내용을 입력해주세요.');return;}const btn=document.getElementById('screenBtn'),spin=document.getElementById('spin'),btnTxt=document.getElementById('btnTxt'),resultArea=document.getElementById('resultArea');btn.disabled=true;spin.style.display='block';btnTxt.textContent='분석 중...';resultArea.innerHTML='';const prompt=`당신은 코나아이의 채용 담당자입니다. 아래 JD 기준으로 지원자의 이력서를 스크리닝해주세요.\n\n[포지션]\n${pos.name}\n\n[JD]\n${pos.jd}\n\n[지원자 이력서 (개인정보 제외)]\n${resume}\n\n아래 JSON 형식으로만 응답하세요. 다른 텍스트 없이 JSON만:\n\n{\n  "verdict": "적합" 또는 "부적합" 또는 "검토필요",\n  "summary": "2~3문장으로 종합 판정 요약",\n  "pros": ["강점 1", "강점 2", "강점 3"],\n  "cons": ["아쉬운 점 1", "아쉬운 점 2"],\n  "recommendation": "면접 진행 여부에 대한 최종 의견 1~2문장"\n}\n\n판정 기준:\n- 적합: 필수 조건을 충족하고 포지션에 잘 맞음\n- 부적합: 필수 조건 미충족 또는 포지션과 맞지 않음\n- 검토필요: 일부 조건 충족이나 추가 확인이 필요한 경우`;try{const res=await fetch('/.netlify/functions/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});const data=await res.json();const raw=data.content.map(i=>i.text||'').join('');const clean=raw.replace(/```json|```/g,'').trim();const result=JSON.parse(clean);renderResult(result,pos.name);}catch(e){resultArea.innerHTML=`<div class="err-box">⚠️ 오류가 났어요. 잠시 후 다시 시도해주세요.<br><small>${e.message}</small></div>`;}btn.disabled=false;spin.style.display='none';btnTxt.textContent='🔍 스크리닝 시작';}
function renderResult(r,posName){const verdictClass=r.verdict==='적합'?'pass':r.verdict==='부적합'?'fail':'review';const verdictIcon=r.verdict==='적합'?'✅':r.verdict==='부적합'?'❌':'🔶';const prosHTML=(r.pros||[]).map(p=>`<div class="criteria-item"><div class="criteria-icon">✓</div><div class="criteria-text">${p}</div></div>`).join('');const consHTML=(r.cons||[]).map(c=>`<div class="criteria-item"><div class="criteria-icon">△</div><div class="criteria-text">${c}</div></div>`).join('');document.getElementById('resultArea').innerHTML=`<div class="result-card show"><div class="result-header"><div class="verdict-badge ${verdictClass}">${verdictIcon} ${r.verdict}</div><div class="verdict-pos">${posName}</div></div><div class="result-body"><div class="result-section"><div class="result-section-title">종합 요약</div><div class="summary-text">${r.summary}</div></div>${prosHTML?`<div class="result-section"><div class="result-section-title">강점</div><div class="criteria-list">${prosHTML}</div></div>`:''} ${consHTML?`<div class="result-section"><div class="result-section-title">아쉬운 점</div><div class="criteria-list">${consHTML}</div></div>`:''}<div class="result-section"><div class="result-section-title">면접 진행 의견</div><div class="summary-text">${r.recommendation}</div></div></div></div>`;}
function openAddModal(){document.getElementById('addModal').classList.add('show');}
function closeAddModal(){document.getElementById('addModal').classList.remove('show');document.getElementById('newPosName').value='';document.getElementById('newPosJD').value='';}
function savePosition(){const name=document.getElementById('newPosName').value.trim();const jd=document.getElementById('newPosJD').value.trim();if(!name||!jd){alert('포지션명과 JD를 모두 입력해주세요.');return;}const id='pos-'+Date.now();positions.push({id,name,jd});saveToStorage();renderSidebar();closeAddModal();}
init();
</script>
</body>
</html>
